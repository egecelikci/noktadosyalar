# yaml-language-server: $schema=https://schemas.recyclarr.dev/v8/config-schema.json
radarr:
  radarr-main:
    base_url: http://127.0.0.1:7878
    api_key: !env_var RADARR_API_KEY

    quality_definition:
      type: movie

    quality_profiles:
      - trash_id: d1d67249d3890e49bc12e275d989a7e9 # HD Bluray + WEB
        reset_unmatched_scores:
          enabled: true

      - trash_id: 722b624f9af1e492284c4bc842153a38 # [Anime] Remux-1080p
        reset_unmatched_scores:
          enabled: true

    custom_formats:
      - trash_ids:
          - f8bf8eab4617f12dfdbd16303d8da245 # [Optional] Golden Rule HD
        assign_scores_to:
          - name: HD Bluray + WEB
            score: 0

      - trash_ids:
          - dc98083864ea246d05a42df0d05f81cc # x265 (HD)
        assign_scores_to:
          - name: HD Bluray + WEB
            score: 0

      - trash_ids:
          - a3ac6af01d78e4f21fcb75f601ac96df # [Unwanted] Unwanted Formats
        assign_scores_to:
          - name: HD Bluray + WEB
            score: -10000
