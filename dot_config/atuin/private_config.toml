enter_accept = true
update_check = false
sync_frequency = "5m"
style = "compact"
inline_height = 20
show_preview = true
show_help = false
show_tabs = false
search_mode = "fuzzy"
filter_mode = "global"
secrets_filter = true
history_filter = [
    "^secret-cmd",
    "^bws secret get",
    "^rclone config",
]

[stats]
ignored_commands = [
    "cd",
    "ls",
    "eza",
    "bat",
    "cat",
    "clear"
]

[sync]
records = true
